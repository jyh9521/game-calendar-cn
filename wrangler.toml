name = "game-calendar-cn"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "TRANSLATION_KV"
id = "14a0976b603941c8a2f3b11f6bc63830"
# preview_id 用于本地开发（wrangler dev）
preview_id = "176798581791437c9727ddcfd864359c"
# 说明：存储翻译缓存 (trans:*) 和种子词库 (dict:*)

[[kv_namespaces]]
binding = "CALENDAR_KV"
id = "b1e3dcfab5024878ba17f78aae26fb4a"
preview_id = "bc0a8db559ef41c7b8c9781c26aea235"
# 说明：存储预生成的 .ics 文件 (ics:*)

# Cron 触发器：每 12 小时执行一次定时更新
[triggers]
crons = ["0 */12 * * *"]

# 环境变量（secrets 请通过 `wrangler secret put` 设置）
[vars]
WIKIPEDIA_USER_AGENT = "game-calendar-cn/1.0 (https://game-calendar-cn.workers.dev; your@email.com)"
